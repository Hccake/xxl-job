services:
  postgres:
    image: postgres:16
    container_name: xxl-job-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xxl_job}
      POSTGRES_USER: ${POSTGRES_USER:-xxl_job}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xxl_job_pwd}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Only runs when the database data directory is initialized for the first time.
      - ../doc/db/tables_xxl_job_postgresql.sql:/docker-entrypoint-initdb.d/tables_xxl_job_postgresql.sql:ro
      - ${POSTGRES_PATH:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - xxl-job-network

  xxl-job-admin:
    image: ${XXL_JOB_ADMIN_IMAGE:-hccake/xxl-job-admin:local}
    build:
      context: ../xxl-job-admin
      dockerfile: Dockerfile
    container_name: xxl-job-admin
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-xxl_job}
        --spring.datasource.username=${POSTGRES_USER:-xxl_job}
        --spring.datasource.password=${POSTGRES_PASSWORD:-xxl_job_pwd}
        --spring.datasource.driver-class-name=org.postgresql.Driver
        --server.port=${XXL_JOB_ADMIN_PORT:-8080}
        --server.servlet.context-path=${XXL_JOB_ADMIN_CONTEXT_PATH:-/}
    ports:
      - "${XXL_JOB_ADMIN_PORT:-8080}:${XXL_JOB_ADMIN_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:${XXL_JOB_ADMIN_PORT:-8080}/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - xxl-job-network

  xxl-job-executor-sample-springboot:
    image: ${XXL_JOB_EXECUTOR_IMAGE:-hccake/xxl-job-executor-sample-springboot:local}
    build:
      context: ../xxl-job-executor-samples/xxl-job-executor-sample-springboot
      dockerfile: Dockerfile
    container_name: xxl-job-executor-sample-springboot
    environment:
      PARAMS: >-
        --xxl.job.admin.addresses=http://xxl-job-admin:${XXL_JOB_ADMIN_PORT:-8080}${XXL_JOB_ADMIN_CONTEXT_PATH:-/}
    ports:
      - "${XXL_JOB_EXECUTOR_PORT:-9999}:9999"
    depends_on:
      xxl-job-admin:
        condition: service_healthy
    networks:
      - xxl-job-network

networks:
  xxl-job-network:
    driver: bridge
