name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Docker image tag to publish, for example 3.4.1-2
        required: true
        default: 3.4.1-2
      push_latest:
        description: Also publish the latest tag
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: hccake
  DOCKERHUB_NAMESPACE: hccake
  ADMIN_IMAGE: xxl-job-admin
  EXECUTOR_IMAGE: xxl-job-executor-sample-springboot

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Resolve image tags
        id: image-tags
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            PUSH_LATEST="${{ inputs.push_latest }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            PUSH_LATEST="false"
          fi

          if [[ ! "${VERSION}" =~ ^[0-9A-Za-z][0-9A-Za-z_.-]{0,127}$ ]]; then
            echo "Invalid Docker image tag: ${VERSION}" >&2
            exit 1
          fi

          ADMIN_TAGS="${DOCKERHUB_NAMESPACE}/${ADMIN_IMAGE}:${VERSION}"
          EXECUTOR_TAGS="${DOCKERHUB_NAMESPACE}/${EXECUTOR_IMAGE}:${VERSION}"

          if [[ "${PUSH_LATEST}" == "true" ]]; then
            ADMIN_TAGS="${ADMIN_TAGS}"$'\n'"${DOCKERHUB_NAMESPACE}/${ADMIN_IMAGE}:latest"
            EXECUTOR_TAGS="${EXECUTOR_TAGS}"$'\n'"${DOCKERHUB_NAMESPACE}/${EXECUTOR_IMAGE}:latest"
          fi

          {
            echo "version=${VERSION}"
            echo "admin_tags<<EOF"
            echo "${ADMIN_TAGS}"
            echo "EOF"
            echo "executor_tags<<EOF"
            echo "${EXECUTOR_TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify Maven version matches image tag
        run: |
          PROJECT_VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          if [[ "${PROJECT_VERSION}" != "${{ steps.image-tags.outputs.version }}" ]]; then
            echo "Maven project version ${PROJECT_VERSION} does not match image tag ${{ steps.image-tags.outputs.version }}" >&2
            exit 1
          fi

      - name: Build release artifacts
        run: mvn -B package --file pom.xml

      - name: Validate PostgreSQL Compose file
        run: docker compose -f docker/docker-compose-postgresql.yml config

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: ./xxl-job-admin
          file: ./xxl-job-admin/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image-tags.outputs.admin_tags }}

      - name: Build and push executor sample image
        uses: docker/build-push-action@v6
        with:
          context: ./xxl-job-executor-samples/xxl-job-executor-sample-springboot
          file: ./xxl-job-executor-samples/xxl-job-executor-sample-springboot/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image-tags.outputs.executor_tags }}
